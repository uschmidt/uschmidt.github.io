<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	html, body {
		height: 100%;
		overflow: hidden;
	}

	:root {
		--bg: #fff;
		--fg: #111;
		--muted: #888;
		--desc: #666;
		--balance: #999;
		--disabled-bg: #cbd5e1;
	}

	body.dark {
		--bg: #111;
		--fg: #eee;
		--muted: #666;
		--desc: #999;
		--balance: #666;
		--disabled-bg: #333;
	}

	body {
		background: var(--bg);
		color: var(--fg);
		display: flex;
		align-items: center;
		justify-content: center;
		font-family: 'DM Mono', monospace;
		user-select: none;
		-webkit-user-select: none;
		transition: background 0.3s ease, color 0.3s ease;
	}

	.offer {
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: 1.2rem;
	}

	.offer-label {
		font-size: 0.85rem;
		font-weight: 300;
		color: var(--muted);
		letter-spacing: 0.06em;
	}

	.offer-title {
		font-size: 1.6rem;
		font-weight: 500;
		color: var(--fg);
		letter-spacing: -0.02em;
		text-align: center;
		line-height: 1.3;
	}

	.offer-desc {
		font-size: 0.85rem;
		font-weight: 300;
		color: var(--desc);
		text-align: center;
		line-height: 1.5;
	}

	.buy-btn {
		margin-top: 0.5rem;
		background: #2563eb;
		color: #fff;
		font-family: 'DM Mono', monospace;
		font-size: 0.85rem;
		font-weight: 500;
		letter-spacing: 0.06em;
		padding: 0.65rem 1.8rem;
		border: none;
		border-radius: 999px;
		cursor: pointer;
		transition: background 0.2s ease, transform 0.15s ease;
	}

	.buy-btn:hover {
		background: #1d4ed8;
		transform: scale(1.05);
	}

	.buy-btn:active {
		transform: scale(0.97);
	}

	.buy-btn:disabled {
		background: var(--disabled-bg);
		cursor: not-allowed;
		transform: none;
	}

	.owned-label {
		margin-top: 0.5rem;
		font-size: 0.85rem;
		font-weight: 500;
		color: #16a34a;
		letter-spacing: 0.04em;
	}

	.balance {
		position: fixed;
		top: 2rem;
		right: 2.5rem;
		font-size: 0.85rem;
		font-weight: 300;
		color: var(--balance);
		letter-spacing: 0.04em;
	}

	.back-btn {
		position: fixed;
		bottom: 2.5rem;
		right: 2.5rem;
		display: flex;
		align-items: center;
		justify-content: center;
		width: 2.6rem;
		height: 2.6rem;
		background: #2563eb;
		color: #fff;
		border: none;
		border-radius: 999px;
		cursor: pointer;
		text-decoration: none;
		transition: background 0.2s ease, transform 0.15s ease;
	}

	.back-btn:hover {
		background: #1d4ed8;
		transform: scale(1.05);
	}

	.back-btn:active {
		transform: scale(0.97);
	}

	.back-btn svg {
		width: 1.1rem;
		height: 1.1rem;
		fill: none;
		stroke: #fff;
		stroke-width: 2.2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}

	.shop-content {
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: 2rem;
	}

	.cosmetics-btn {
		background: linear-gradient(135deg, #a855f7, #6366f1);
		color: #fff;
		font-family: 'DM Mono', monospace;
		font-size: 0.85rem;
		font-weight: 500;
		letter-spacing: 0.06em;
		padding: 0.55rem 1.4rem;
		border: none;
		border-radius: 999px;
		cursor: pointer;
		text-decoration: none;
		display: none;
		transition: transform 0.15s ease, opacity 0.15s ease;
	}

	.cosmetics-btn:hover {
		transform: scale(1.05);
	}

	.cosmetics-btn:active {
		transform: scale(0.97);
	}

	.cosmetics-btn.visible {
		display: inline-block;
	}
</style>
</head>
<body>

<div class="shop-content">
	<a class="cosmetics-btn" id="cosmeticsBtn" href="cosmetics.html">cosmetics</a>
	<div class="offer" id="offer">
		<div class="offer-label" id="offerLabel">angebot</div>
		<div class="offer-title" id="offerTitle">+1.2 pro klick</div>
		<div class="offer-desc" id="offerDesc">jeder klick zählt 1.2 statt 1</div>
		<button class="buy-btn" id="buyBtn" type="button">100 klicks</button>
	</div>
</div>

<div class="balance" id="balance"></div>

<a class="back-btn" href="counter.html" aria-label="Zurück">
	<svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
</a>

<script>
	if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark');

	let count = parseFloat(localStorage.getItem('count')) || 0;
	let incrementValue = parseFloat(localStorage.getItem('increment_value')) || 1;
	const buyBtn = document.getElementById('buyBtn');
	const balanceEl = document.getElementById('balance');
	const offerTitle = document.getElementById('offerTitle');
	const offerDesc = document.getElementById('offerDesc');
	const offerLabel = document.getElementById('offerLabel');

	const ownedCosmetics = JSON.parse(localStorage.getItem('owned_cosmetics') || '[]');

	const offers = [
		{ cost: 100, value: 1.2, title: '+1.2 pro klick', desc: 'jeder klick zählt 1.2 statt 1' },
		{ cost: 250, value: 1.6, title: '+1.6 pro klick', desc: 'jeder klick zählt 1.6 statt 1.2' },
		{ cost: 500, value: 2, title: '+2 pro klick', desc: 'jeder klick zählt 2 statt 1.6' },
		{ cost: 1000, value: 3.5, title: '+3.5 pro klick', desc: 'jeder klick zählt 3.5 statt 2' }
	];

	function getCurrentOffer() {
		if (incrementValue < 1.2) return 0;
		if (incrementValue < 1.6) return 1;
		if (incrementValue < 2) return 2;
		if (incrementValue < 3.5) return 3;
		return -1;
	}

	function displayBalance() {
		const display = Math.floor(count * 10) / 10;
		const text = display % 1 === 0 ? display.toFixed(0) : display.toFixed(1);
		balanceEl.textContent = text + ' klicks';
	}

	function updateUI() {
		displayBalance();
		const idx = getCurrentOffer();

		if (count >= 20 || ownedCosmetics.length > 0) {
			document.getElementById('cosmeticsBtn').classList.add('visible');
		}

		if (idx === -1) {
			offerLabel.textContent = 'ausverkauft';
			offerTitle.textContent = 'alle upgrades gekauft';
			offerDesc.textContent = '+3.5 pro klick aktiv';
			buyBtn.style.display = 'none';
			return;
		}

		const offer = offers[idx];
		offerTitle.textContent = offer.title;
		offerDesc.textContent = offer.desc;
		buyBtn.style.display = '';

		if (count >= offer.cost) {
			buyBtn.disabled = false;
			buyBtn.textContent = offer.cost + ' klicks';
		} else {
			buyBtn.disabled = true;
			buyBtn.textContent = offer.cost + ' klicks';
		}
	}

	updateUI();

	buyBtn.addEventListener('click', () => {
		const idx = getCurrentOffer();
		if (idx === -1) return;
		const offer = offers[idx];

		if (count >= offer.cost) {
			count -= offer.cost;
			incrementValue = offer.value;
			localStorage.setItem('count', count);
			localStorage.setItem('increment_value', incrementValue);
			updateUI();
		}
	});
</script>

</body>
</html>
